name: go-test
on:
  workflow_dispatch:
  push:
    paths:
      - cmd/**
      - pkg/**
      - utils/**
      - integration/**
      - Makefile
      - go.mod
      - go.sum
      - .github/workflows/go-test.yml
  pull_request:
    paths:
      - cmd/**
      - pkg/**
      - utils/**
      - integration/**
      - Makefile
      - go.mod
      - go.sum
      - .github/workflows/go-test.yml

permissions:
  contents: read

jobs:
  go-test:
    name: go-test
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
    - name: Set Git config
      run: git config --global core.autocrlf false

    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version-file: go.mod
        cache: true

    - name: Install staticcheck
      shell: pwsh
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
        "$(go env GOPATH)\bin" >> $env:GITHUB_PATH

    - name: Lint
      run: make lint

    - name: Test
      run: make test
